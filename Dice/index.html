<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Game - Input</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Dice Simulator</h1>
        <p style="text-align: center; color: #6b7280;">Enter data for 3 players to start the game.</p>
        
        <form action="php/game.php" method="POST">
            
            <div class="user-block">
                <h3>Player 1</h3>
                <label>First Name:</label>
                <input type="text" name="name[]" required>
                <label>Last Name:</label>
                <input type="text" name="surname[]" required>
                <label>Address:</label>
                <input type="text" name="address[]" required>
            </div>

            <div class="user-block">
                <h3>Player 2</h3>
                <label>First Name:</label>
                <input type="text" name="name[]" required>
                <label>Last Name:</label>
                <input type="text" name="surname[]" required>
                <label>Address:</label>
                <input type="text" name="address[]" required>
            </div>

            <div class="user-block">
                <h3>Player 3</h3>
                <label>First Name:</label>
                <input type="text" name="name[]" required>
                <label>Last Name:</label>
                <input type="text" name="surname[]" required>
                <label>Address:</label>
                <input type="text" name="address[]" required>
            </div>

            <button type="submit" name="start_game">Roll the Dice</button>
        </form>
    </div>
</body>
</html>
